# 개발자가 main 브랜치에서 수동 실행해 prod ECS 서비스에 배포합니다.
name: Deploy prod api

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and deploy prod api
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      HEALTH_CHECK_URL: ${{ vars.HEALTH_CHECK_URL || secrets.HEALTH_CHECK_URL }}

    steps:
      - name: Validate main branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production deploy must run from main branch"
            exit 1
          fi

      - name: Validate deployment settings
        run: |
          test -n "$AWS_ROLE_ARN"
          test -n "$AWS_ACCOUNT_ID"
          test -n "$AWS_REGION"
          test -n "$ECR_REGISTRY"
          test -n "$ECR_REPOSITORY"
          test -n "$ECS_CLUSTER"
          test -n "$ECS_SERVICE"

          expected_registry="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          if [ "$ECR_REGISTRY" != "$expected_registry" ]; then
            echo "ECR_REGISTRY does not match AWS_ACCOUNT_ID/AWS_REGION"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          image_uri="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build \
            -t "$image_uri:${GITHUB_SHA}" \
            -t "$image_uri:latest" \
            .

      - name: Push Docker image
        run: |
          image_uri="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker push "$image_uri:${GITHUB_SHA}"
          docker push "$image_uri:latest"

      - name: Verify ECR image
        run: |
          aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="${GITHUB_SHA}" imageTag=latest \
            --query 'imageDetails[].imageTags' \
            --output json

      - name: Force ECS service deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --query 'service.{serviceName:serviceName,status:status,desiredCount:desiredCount,runningCount:runningCount}' \
            --output json

      - name: Verify ECS service
        run: |
          desired_count="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].desiredCount' \
            --output text)"

          if [ "$desired_count" = "None" ] || [ "$desired_count" = "null" ]; then
            echo "ECS service not found"
            exit 1
          fi

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].{serviceName:serviceName,status:status,desiredCount:desiredCount,runningCount:runningCount}' \
            --output json

          if [ "$desired_count" -gt 0 ]; then
            aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE"

            if [ -z "$HEALTH_CHECK_URL" ]; then
              echo "HEALTH_CHECK_URL is required when desired count is greater than 0"
              exit 1
            fi

            curl --fail --silent --show-error \
              --retry 12 \
              --retry-delay 5 \
              --retry-connrefused \
              "$HEALTH_CHECK_URL" >/dev/null
          fi
