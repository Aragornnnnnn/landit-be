# 개발자가 main 브랜치에서 수동 실행해 prod ECS 서비스에 배포합니다.
name: Deploy prod api

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  migrate:
    name: Migrate prod DB schema
    uses: ./.github/workflows/flyway-migration.yml
    with:
      environment: prod
      ref: ${{ github.ref }}

  deploy:
    name: Build and deploy prod api
    needs: migrate
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      HEALTH_CHECK_URL: ${{ vars.HEALTH_CHECK_URL || secrets.HEALTH_CHECK_URL }}

    steps:
      - name: Validate main branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production deploy must run from main branch"
            exit 1
          fi

      - name: Validate deployment settings
        run: |
          test -n "$AWS_ROLE_ARN"
          test -n "$AWS_ACCOUNT_ID"
          test -n "$AWS_REGION"
          test -n "$ECR_REGISTRY"
          test -n "$ECR_REPOSITORY"
          test -n "$ECS_CLUSTER"
          test -n "$ECS_SERVICE"

          expected_registry="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          if [ "$ECR_REGISTRY" != "$expected_registry" ]; then
            echo "ECR_REGISTRY does not match AWS_ACCOUNT_ID/AWS_REGION"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          image_uri="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build \
            -t "$image_uri:${GITHUB_SHA}" \
            -t "$image_uri:latest" \
            .

      - name: Push Docker image
        run: |
          image_uri="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker push "$image_uri:${GITHUB_SHA}"
          docker push "$image_uri:latest"

      - name: Force ECS service deployment
        id: deploy
        run: |
          deployment="$(aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --output json)"
          deployment_id="$(jq -r '.service.deployments[] | select(.status == "PRIMARY") | .id' <<< "$deployment")"
          deployment_created_at="$(jq -r '.service.deployments[] | select(.status == "PRIMARY") | .createdAt' <<< "$deployment")"

          if [ -z "$deployment_id" ] || [ "$deployment_id" = "null" ] || [ -z "$deployment_created_at" ] || [ "$deployment_created_at" = "null" ]; then
            echo "New PRIMARY ECS deployment was not returned by update-service"
            echo "$deployment"
            exit 1
          fi

          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"
          echo "deployment_created_at=$deployment_created_at" >> "$GITHUB_OUTPUT"
          echo "$deployment" | jq '.service | {serviceName, status, desiredCount, runningCount, deployments}'

      - name: Verify ECS service
        timeout-minutes: 10
        env:
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.deployment_id }}
          DEPLOYMENT_CREATED_AT: ${{ steps.deploy.outputs.deployment_created_at }}
        run: |
          bash .github/scripts/verify-ecs-deployment.sh
