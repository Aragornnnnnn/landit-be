spring:
  application:
    name: landit-be
  jackson:
    time-zone: Asia/Seoul
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/{vendor}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  metrics:
    tags:
      service.version: ${APP_VERSION:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  otlp:
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:false}
        step: ${MANAGEMENT_OTLP_METRICS_EXPORT_STEP:30s}

landit:
  cors:
    allowed-origins: ${LANDIT_CORS_ALLOWED_ORIGINS:}
  auth:
    oidc:
      google-audiences: ${LANDIT_AUTH_OIDC_GOOGLE_AUDIENCES:}
      kakao-audiences: ${LANDIT_AUTH_OIDC_KAKAO_AUDIENCES:}
      apple-audiences: ${LANDIT_AUTH_OIDC_APPLE_AUDIENCES:}
    token:
      secret: ${LANDIT_AUTH_TOKEN_SECRET}
      access-expires-in-seconds: ${LANDIT_AUTH_TOKEN_ACCESS_EXPIRES_IN_SECONDS:1800}
      refresh-expires-in-seconds: ${LANDIT_AUTH_TOKEN_REFRESH_EXPIRES_IN_SECONDS:1209600}
  ai:
    client-mode: ${LANDIT_AI_CLIENT_MODE:local}
    base-url: ${LANDIT_AI_BASE_URL:}
    service-audience: ${LANDIT_AI_SERVICE_AUDIENCE:KOREAN_LEARNER}
    connect-timeout: ${LANDIT_AI_CONNECT_TIMEOUT:5s}
    request-timeout: ${LANDIT_AI_REQUEST_TIMEOUT:60s}
    session-feedback-request-timeout: ${LANDIT_AI_SESSION_FEEDBACK_REQUEST_TIMEOUT:120s}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}

server:
  tomcat:
    mbeanregistry:
      enabled: true
