spring:
  datasource:
    url: jdbc:h2:mem:landit;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

sentry:
  dsn:

management:
  otlp:
    metrics:
      export:
        enabled: false

landit:
  auth:
    oidc:
      fake-enabled: true
    token:
      secret: landit-test-token-secret-that-is-long-enough
